name: trend-radar-daily

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional date in YYYY-MM-DD. Leave empty to use Asia/Shanghai today."
        required: false
        type: string
      run_weekly:
        description: "Also generate any due weekly artifacts anchored to target_date."
        required: false
        default: true
        type: boolean
      backfill_missing_days:
        description: "Allow weekly generation to backfill missing daily window days."
        required: false
        default: true
        type: boolean
      build_kb:
        description: "Also refresh knowledge-base artifacts after the daily run."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: trend-radar-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      GITHUB_TOKEN: ${{ secrets.TREND_RADAR_GITHUB_TOKEN || github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_API_BASE: ${{ secrets.MINIMAX_API_BASE }}
      MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
      MINIMAX_COMPLETION_MODEL: ${{ secrets.MINIMAX_COMPLETION_MODEL }}
      MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
      MINIMAX_API_STYLE: ${{ secrets.MINIMAX_API_STYLE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout agents-radar producer workspace
        uses: actions/checkout@v4
        with:
          repository: duanyytop/agents-radar
          path: data/upstream/agents-radar-source
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve automation options
        id: options
        env:
          INPUT_TARGET_DATE: ${{ github.event.inputs.target_date }}
          INPUT_RUN_WEEKLY: ${{ github.event.inputs.run_weekly }}
          INPUT_BACKFILL_MISSING_DAYS: ${{ github.event.inputs.backfill_missing_days }}
          INPUT_BUILD_KB: ${{ github.event.inputs.build_kb }}
        shell: bash
        run: |
          TARGET_DATE="${INPUT_TARGET_DATE:-}"
          if [[ -z "${TARGET_DATE}" ]]; then
            TARGET_DATE="$(TZ="${TZ}" date +%F)"
          fi
          if [[ ! "${TARGET_DATE}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "target_date must match YYYY-MM-DD" >&2
            exit 1
          fi

          RUN_WEEKLY="${INPUT_RUN_WEEKLY:-true}"
          BACKFILL_MISSING_DAYS="${INPUT_BACKFILL_MISSING_DAYS:-true}"
          BUILD_KB="${INPUT_BUILD_KB:-false}"

          echo "target_date=${TARGET_DATE}" >> "${GITHUB_OUTPUT}"
          echo "run_weekly=${RUN_WEEKLY}" >> "${GITHUB_OUTPUT}"
          echo "backfill_missing_days=${BACKFILL_MISSING_DAYS}" >> "${GITHUB_OUTPUT}"
          echo "build_kb=${BUILD_KB}" >> "${GITHUB_OUTPUT}"

      - name: Run daily automation pipeline
        id: daily_pipeline
        continue-on-error: true
        env:
          RUN_WEEKLY: ${{ steps.options.outputs.run_weekly }}
          BACKFILL_MISSING_DAYS: ${{ steps.options.outputs.backfill_missing_days }}
          BUILD_KB: ${{ steps.options.outputs.build_kb }}
        run: pnpm automation:daily -- "${{ steps.options.outputs.target_date }}"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-radar-${{ steps.options.outputs.target_date }}
          path: |
            data/reports/${{ steps.options.outputs.target_date }}.*
            data/reports/latest.*
            data/raw/${{ steps.options.outputs.target_date }}.json
            data/normalized/${{ steps.options.outputs.target_date }}.json
            data/scores/${{ steps.options.outputs.target_date }}.json
            data/classifications/${{ steps.options.outputs.target_date }}.json
            data/raw/github/${{ steps.options.outputs.target_date }}.enrichment.json
            data/raw/github-stars/${{ steps.options.outputs.target_date }}.json
            data/raw/github-stars/tracked-repos.json
            data/kb/latest.json
          if-no-files-found: warn

      - name: Fail job when daily pipeline reported an error
        if: steps.daily_pipeline.outcome == 'failure'
        run: |
          echo "daily automation pipeline reported an error; artifacts were still uploaded and committed"
          exit 1
