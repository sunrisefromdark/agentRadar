          - coding-agent
          - code-review
        repo_seeds:
          - openai/codex
          - Aider-AI/aider
        org_seeds:
          - openai
          - anthropics
        negative_keywords:
          - video game
          - gaming
          - minecraft
      - name: agent-runtime
        enabled: true
        keywords:
          - runtime
          - orchestration
          - workflow
          - sandbox
          - scheduler
