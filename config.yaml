sources:
  agents_radar:
    enabled: true
    mode: github-http
    local_path: data/upstream/agents-radar-source
    manifest_path: data/upstream/agents-radar-source/manifest.json
    repo_url: https://github.com/duanyytop/agents-radar
    refresh_timeout_ms: 300000
    reports:
      daily:
        - ai-trending
        - ai-agents
        - ai-cli
      weekly:
        - ai-weekly
      monthly:
        - ai-monthly
  trendshift:
    enabled: true
    mode: http
    base_url: https://trendshift.io
    snapshot_dir: data/raw/trendshift
  ecosystem_focus:
    enabled: true
    mode: github-search
    recent_days: 7
    per_ecosystem_limit: 10
    max_total_candidates: 25
    historical_precision_days: 45
    judge_top_n: 20
    entity_tiers:
      core:
        builders:
          - simonw
          - paul-gauthier
          - hwchase17
          - karpathy
        companies:
          - openai
          - anthropics
          - google
          - google-gemini
          - google-deepmind
          - microsoft
          - aws
          - awslabs
          - meta-llama
          - xai-org
          - mistralai
          - cohere-ai
          - deepseek-ai
          - QwenLM
        engineers:
