llm:
  enabled: false
  mode: rules-only
  provider: none
  daily_judge_top_n: 12
weights:
  star_velocity: 0.2
  engagement_score: 0.2
  architecture_shift: 0.2
  compounding_capability: 0.15
  autonomy_score: 0.15
  discussion_score: 0.1
thresholds:
  high_score: 75
  anomaly_star_delta_daily: 500
  anomaly_star_delta_weekly: 1500
  min_engagement_ratio: 0.02
  min_sources_for_discussion_bonus: 2
runtime:
  dry_run_default: false
  retry:
    attempts: 3
    base_delay_ms: 1000
  logging:
    level: info
    json: false
