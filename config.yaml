          - yoheinakajima
          - jxnl
          - rasbt
          - samuelcolvin
        companies:
          - EleutherAI
          - allenai
          - THUDM
          - InternLM
          - minimax-ai
          - ByteDance-Seed
          - alibaba
          - Tencent
          - TencentARC
