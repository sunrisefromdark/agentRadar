  <text x="106" y="92" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Daily Board</text>
  <text x="72" y="122" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">Capture one-day movement with</text>
  <text x="72" y="144" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">scores, summaries, and run health.</text>

  <rect x="354" y="52" width="252" height="116" rx="18" fill="#ECFDF5"/>
