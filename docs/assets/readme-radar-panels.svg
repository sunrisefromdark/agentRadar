<svg width="960" height="220" viewBox="0 0 960 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="220" rx="24" fill="#FCFCFD"/>
  <rect x="24" y="24" width="912" height="172" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>

  <rect x="52" y="52" width="252" height="116" rx="18" fill="#EFF6FF"/>
