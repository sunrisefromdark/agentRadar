  <text x="374" y="122" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">Separate durable trends from</text>
  <text x="374" y="144" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">short-lived spikes and noise.</text>

  <rect x="656" y="52" width="252" height="116" rx="18" fill="#FFF7ED"/>
  <circle cx="690" cy="86" r="10" fill="#EA580C"/>
  <text x="710" y="92" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Knowledge Loop</text>
  <text x="676" y="122" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">Turn signals into observer pools</text>
  <text x="676" y="144" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">and reusable knowledge cards.</text>
